<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sticker Maker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>Sticker Maker</h1>
  <p class="subtitle">Telegram · autocrop · 512px · 512kb</p>

  <div class="card">

    <div class="settings">
      <div class="setting-group">
        <label for="threshold">Допуск цвета фона</label>
        <div class="range-row">
          <input type="range" id="threshold" min="5" max="100" value="20">
          <span class="range-val" id="thresholdVal">20</span>
        </div>
      </div>
      <div class="setting-group">
        <label for="fmt">Формат вывода</label>
        <select id="fmt">
          <option value="auto">Авто (PNG → WebP)</option>
          <option value="png">PNG всегда</option>
          <option value="webp">WebP всегда</option>
        </select>
      </div>
    </div>

    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" multiple accept="image/*">
      <span class="drop-icon">🖼️</span>
      <p class="drop-text">
        <strong>Перетащи изображения сюда</strong><br>
        или кликни для выбора файлов<br>
        <span class="drop-hint">PNG, JPG, WEBP — любые форматы</span>
      </p>
    </div>

    <div class="queue" id="queue"></div>
    <div class="log" id="log"></div>

    <button class="btn" id="processBtn" disabled>Обработать стикеры</button>
    <button class="clear-btn" id="clearBtn" style="display:none">Очистить список</button>

  </div>

  <canvas id="canvas"></canvas>

  <script type="module" src="js/app.js"></script>
</body>
</html>
