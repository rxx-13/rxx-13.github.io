name: Deploy to HuggingFace Space

on:
  push:
    branches: [master]
    paths:
      - 'server/server.py'
      - 'server/requirements.txt'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

          git clone https://dmitry-402859:${HF_TOKEN}@huggingface.co/spaces/dmitry-402859/space hf-space

          cp server/server.py hf-space/server.py
          cp server/requirements.txt hf-space/requirements.txt

          cd hf-space
          git add server.py requirements.txt
          git diff --staged --quiet || git commit -m "sync: ${{ github.event.head_commit.message }}" && git push
